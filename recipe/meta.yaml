{% set name = "cloudevents" %}
{% set version = "2.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/cloudevents-{{ version }}.tar.gz
  sha256: 3224851b2ac902b868ed4bc1aa10772ada8cdf85f180322b12968d90a1dceef2

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - hatchling
  run:
    - python >={{ python_min }}
    - deprecation >=2.0,<3.0
    - pydantic >=1.0.0,<3.0
    - python-dateutil >=2.8.2

test:
  imports:
    - cloudevents
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/cloudevents/sdk-python
  summary: CloudEvents Python SDK
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - sarthakpati
